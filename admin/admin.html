<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HJ HACKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            background: white;
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .navbar-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
        }

        .navbar-title i {
            color: #667eea;
            margin-right: 10px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 48, 48, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 35px;
            color: white;
        }

        .stat-info h3 {
            color: #718096;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .stat-info .number {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .stat-info .label {
            color: #a0aec0;
            font-size: 12px;
        }

        /* Main Content */
        .main-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .content-header h2 {
            color: #2d3748;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content-header h2 i {
            color: #667eea;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* Users Grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        .user-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-3px);
            border-color: #667eea;
        }

        .user-card.online {
            border-left: 4px solid #48bb78;
        }

        .online-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #48bb78;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info h3 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info h3 i {
            color: #667eea;
            font-size: 16px;
        }

        .user-details {
            background: #f7fafc;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
        }

        .user-details p {
            color: #4a5568;
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-details p:last-child {
            margin-bottom: 0;
        }

        .user-details i {
            color: #667eea;
            width: 18px;
        }

        .userId {
            font-family: monospace;
            background: white;
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 12px;
            color: #2d3748;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            font-size: 11px;
            color: #718096;
        }

        .time-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .no-users {
            text-align: center;
            padding: 60px;
            color: #718096;
            font-size: 16px;
            background: #f7fafc;
            border-radius: 15px;
        }

        .no-users i {
            font-size: 50px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .users-grid {
                grid-template-columns: 1fr;
            }
            
            .content-header {
                flex-direction: column;
            }
            
            .search-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <div class="navbar">
            <div class="navbar-left">
                <img src="https://i.postimg.cc/dVWsQpKw/IMG-20250913-WA0039.jpg" alt="Logo" class="navbar-logo">
                <div class="navbar-title">
                    <i class="fas fa-crown"></i>
                    HJ HACKER Admin Panel
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Users</h3>
                    <div class="number" id="totalUsers">0</div>
                    <div class="label">All time registered</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-circle"></i>
                </div>
                <div class="stat-info">
                    <h3>Online Now</h3>
                    <div class="number" id="onlineUsers">0</div>
                    <div class="label">Currently active</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-plus"></i>
                </div>
                <div class="stat-info">
                    <h3>Today's New</h3>
                    <div class="number" id="todayUsers">0</div>
                    <div class="label">Joined today</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-header">
                <h2>
                    <i class="fas fa-database"></i>
                    Registered Users
                </h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, user ID, or device ID..." onkeyup="searchUsers()">
                </div>
                <button class="refresh-btn" onclick="loadUsers()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh Data
                </button>
            </div>

            <div id="usersGrid" class="users-grid">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let allUsers = [];
        let onlineUsers = new Set();
        const socket = io({
            transports: ['websocket', 'polling']
        });

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch('/admin/check-auth');
                const data = await response.json();
                if (!data.isAuthenticated) {
                    window.location.href = '/admin/login.html';
                }
            } catch (error) {
                console.error('Auth check failed');
                window.location.href = '/admin/login.html';
            }
        }

        // Logout function
        async function logout() {
            try {
                await fetch('/admin/logout', { method: 'POST' });
                window.location.href = '/admin/login.html';
            } catch (error) {
                console.error('Logout failed');
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('/admin/users');
                const data = await response.json();
                allUsers = data.users || [];
                updateUI();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersGrid').innerHTML = `
                    <div class="no-users">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading users. Please try again.</p>
                    </div>
                `;
            }
        }

        function updateUI() {
            document.getElementById('totalUsers').innerText = allUsers.length;
            document.getElementById('onlineUsers').innerText = onlineUsers.size;
            
            const today = new Date().toDateString();
            const todayUsers = allUsers.filter(user => {
                const userDate = new Date(user.firstSeen).toDateString();
                return userDate === today;
            });
            document.getElementById('todayUsers').innerText = todayUsers.length;
            
            displayUsers(allUsers);
        }

        function displayUsers(users) {
            const grid = document.getElementById('usersGrid');
            
            if (users.length === 0) {
                grid.innerHTML = `
                    <div class="no-users">
                        <i class="fas fa-users-slash"></i>
                        <p>No users found</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = users.map(user => {
                const isOnline = onlineUsers.has(user.userId);
                const firstSeen = new Date(user.firstSeen).toLocaleString();
                const lastSeen = user.lastSeen ? new Date(user.lastSeen).toLocaleString() : 'Never';
                const avatarLetter = user.name ? user.name.charAt(0).toUpperCase() : 'U';
                
                return `
                    <div class="user-card ${isOnline ? 'online' : ''}">
                        ${isOnline ? '<span class="online-badge"><i class="fas fa-circle"></i> Online</span>' : ''}
                        <div class="user-avatar">
                            ${user.profilePic ? 
                                `<img src="${user.profilePic}" alt="${user.name}">` : 
                                avatarLetter
                            }
                        </div>
                        <div class="user-info">
                            <h3>
                                <i class="fas fa-user-circle"></i>
                                ${user.name || 'Unknown'}
                            </h3>
                            <div class="user-details">
                                <p>
                                    <i class="fas fa-mobile-alt"></i>
                                    <strong>Device:</strong> <span class="userId">${user.deviceId || 'N/A'}</span>
                                </p>
                                <p>
                                    <i class="fas fa-id-card"></i>
                                    <strong>User ID:</strong> <span class="userId">${user.userId || 'N/A'}</span>
                                </p>
                            </div>
                            <div class="time-info">
                                <span>
                                    <i class="fas fa-calendar-check"></i>
                                    First: ${firstSeen}
                                </span>
                                <span>
                                    <i class="fas fa-clock"></i>
                                    Last: ${lastSeen}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            if (!query) {
                displayUsers(allUsers);
                return;
            }
            
            const filtered = allUsers.filter(user => {
                return (user.name && user.name.toLowerCase().includes(query)) ||
                       (user.userId && user.userId.toLowerCase().includes(query)) ||
                       (user.deviceId && user.deviceId.toLowerCase().includes(query));
            });
            
            displayUsers(filtered);
        }

        // Socket events
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('online-users-list', (users) => {
            onlineUsers.clear();
            users.forEach(user => {
                if (user && user.userId) {
                    onlineUsers.add(user.userId);
                }
            });
            updateUI();
        });

        socket.on('user-online', (user) => {
            if (user && user.userId) {
                onlineUsers.add(user.userId);
                updateUI();
                loadUsers();
            }
        });

        socket.on('user-offline', (user) => {
            if (user && user.userId) {
                onlineUsers.delete(user.userId);
                updateUI();
                loadUsers();
            }
        });

        // Initialize
        checkAuth();
        loadUsers();
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
