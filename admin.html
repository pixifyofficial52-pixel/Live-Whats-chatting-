<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 3em;
            font-weight: bold;
            color: #2d3748;
        }
        
        .stat-card .label {
            color: #718096;
            margin-top: 10px;
        }
        
        .users-section {
            padding: 30px;
        }
        
        .users-section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        .search-bar {
            margin-bottom: 20px;
        }
        
        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .user-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .user-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-3px);
        }
        
        .user-card.online {
            border-left: 4px solid #48bb78;
        }
        
        .online-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #48bb78;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
        }
        
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .user-info h3 {
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1.2em;
        }
        
        .user-info p {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 3px;
        }
        
        .user-info .userId {
            font-family: monospace;
            background: #f7fafc;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        
        .first-seen {
            margin-top: 10px;
            font-size: 0.85em;
            color: #a0aec0;
            border-top: 1px solid #e2e8f0;
            padding-top: 10px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #5a67d8;
        }
        
        .no-users {
            text-align: center;
            padding: 50px;
            color: #718096;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Admin Panel</h1>
            <p>Track All Website Users (Permanent Storage)</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="number" id="totalUsers">0</div>
                <div class="label">All time registered</div>
            </div>
            <div class="stat-card">
                <h3>Online Now</h3>
                <div class="number" id="onlineUsers">0</div>
                <div class="label">Currently active</div>
            </div>
            <div class="stat-card">
                <h3>Today's New</h3>
                <div class="number" id="todayUsers">0</div>
                <div class="label">Joined today</div>
            </div>
        </div>
        
        <div class="users-section">
            <h2>📋 Registered Users</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name or user ID..." onkeyup="searchUsers()">
            </div>
            <div class="users-grid" id="usersGrid">
                <div class="no-users">Loading users...</div>
            </div>
            <button class="refresh-btn" onclick="loadUsers()">🔄 Refresh Data</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let allUsers = [];
        let onlineUsers = new Set();
        const socket = io({
            transports: ['websocket', 'polling']
        });
        
        function loadUsers() {
            fetch('/admin/users')
                .then(response => response.json())
                .then(data => {
                    allUsers = data.users || [];
                    updateUI();
                })
                .catch(error => {
                    console.error('Error loading users:', error);
                    document.getElementById('usersGrid').innerHTML = '<div class="no-users">Error loading users</div>';
                });
        }
        
        function updateUI() {
            document.getElementById('totalUsers').innerText = allUsers.length;
            document.getElementById('onlineUsers').innerText = onlineUsers.size;
            
            const today = new Date().toDateString();
            const todayUsers = allUsers.filter(user => {
                const userDate = new Date(user.firstSeen).toDateString();
                return userDate === today;
            });
            document.getElementById('todayUsers').innerText = todayUsers.length;
            
            displayUsers(allUsers);
        }
        
        function displayUsers(users) {
            const grid = document.getElementById('usersGrid');
            
            if (users.length === 0) {
                grid.innerHTML = '<div class="no-users">No users found</div>';
                return;
            }
            
            grid.innerHTML = users.map(user => {
                const isOnline = onlineUsers.has(user.userId);
                const firstSeen = new Date(user.firstSeen).toLocaleString();
                const lastSeen = user.lastSeen ? new Date(user.lastSeen).toLocaleString() : 'Never';
                const avatarLetter = user.name ? user.name.charAt(0).toUpperCase() : 'U';
                
                return `
                    <div class="user-card ${isOnline ? 'online' : ''}">
                        ${isOnline ? '<span class="online-badge">🟢 Online</span>' : ''}
                        <div class="user-avatar">
                            ${user.profilePic ? 
                                `<img src="${user.profilePic}" alt="${user.name}">` : 
                                avatarLetter
                            }
                        </div>
                        <div class="user-info">
                            <h3>${user.name || 'Unknown'}</h3>
                            <p>📱 Device ID: <span class="userId">${user.deviceId || 'N/A'}</span></p>
                            <p>🆔 User ID: <span class="userId">${user.userId || 'N/A'}</span></p>
                            <p class="first-seen">📅 First Seen: ${firstSeen}</p>
                            <p class="first-seen">🕒 Last Seen: ${lastSeen}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            if (!query) {
                displayUsers(allUsers);
                return;
            }
            
            const filtered = allUsers.filter(user => {
                return (user.name && user.name.toLowerCase().includes(query)) ||
                       (user.userId && user.userId.toLowerCase().includes(query)) ||
                       (user.deviceId && user.deviceId.toLowerCase().includes(query));
            });
            
            displayUsers(filtered);
        }
        
        socket.on('connect', () => {
            console.log('Connected to server');
        });
        
        socket.on('online-users-list', (users) => {
            onlineUsers.clear();
            users.forEach(user => {
                if (user && user.userId) {
                    onlineUsers.add(user.userId);
                }
            });
            updateUI();
        });
        
        socket.on('user-online', (user) => {
            if (user && user.userId) {
                onlineUsers.add(user.userId);
                updateUI();
                loadUsers();
            }
        });
        
        socket.on('user-offline', (user) => {
            if (user && user.userId) {
                onlineUsers.delete(user.userId);
                updateUI();
                loadUsers();
            }
        });
        
        loadUsers();
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
